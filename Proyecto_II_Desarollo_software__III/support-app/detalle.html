<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConneXtion - Detalle de Solicitud</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="navbar-brand">ConneXtion Soporte</div>
        <div class="navbar-user">
            <span>Hola, <strong id="nombre-usuario"></strong></span>
            <span id="rol-usuario" class="badge-rol"></span>
            <button onclick="Ui.cerrarSesion()" class="btn-logout">Cerrar Sesión</button>
        </div>
    </nav>

    <div class="dashboard-container">
        <div class="dashboard-header">
            <div style="display:flex; align-items:center; gap:14px; flex-wrap:wrap;">
                <button onclick="window.location.href='dashboard.html'" class="btn-secondary btn-volver">
                    Volver al panel
                </button>
                <h2 style="margin:0;">Detalle de Solicitud</h2>
            </div>
            <button onclick="irAlChat()" class="btn-primary">
                💬 Abrir Chat
            </button>
        </div>

        <div id="mensaje-error" class="mensaje-error oculto"></div>
        <div id="mensaje-exito" class="mensaje-exito oculto"></div>

        <!-- Tarjeta principal -->
        <div class="detalle-card">
            <div class="detalle-header">
                <div>
                    <span id="ticket-id" class="ticket-id"></span>
                    <h3 id="ticket-titulo"></h3>
                </div>
                <span id="ticket-estado" class="badge-estado"></span>
            </div>

            <div class="detalle-grid">
                <div class="detalle-campo">
                    <label>Cliente</label>
                    <span id="ticket-cliente">—</span>
                </div>
                <div class="detalle-campo">
                    <label>Categoría</label>
                    <span id="ticket-categoria">—</span>
                </div>
                <div class="detalle-campo">
                    <label>Prioridad</label>
                    <span id="ticket-prioridad" class="badge-prioridad">—</span>
                </div>
                <div class="detalle-campo">
                    <label>Fecha de creación</label>
                    <span id="ticket-fecha">—</span>
                </div>
                <div class="detalle-campo">
                    <label>Técnico asignado</label>
                    <span id="ticket-tecnico">—</span>
                </div>
            </div>

            <div class="detalle-descripcion">
                <label>Descripción</label>
                <p id="ticket-descripcion"></p>
            </div>
        </div>

        <!-- Notas técnicas -->
        <div id="panel-notas" class="detalle-card">
            <h3 style="font-size:17px; font-weight:700; margin-bottom:16px; padding-bottom:14px; border-bottom:1px solid var(--gris-borde);">
                📝 Historial de Notas Técnicas
            </h3>

            <div id="lista-notas" class="lista-comentarios-container">
                <p class="texto-vacio">No hay notas técnicas registradas para esta solicitud.</p>
            </div>

            <div id="formulario-nota" class="agregar-nota-container">
                <label>Agregar Nota Técnica</label>
                <textarea id="texto-nota" rows="3" placeholder="Escriba los detalles del avance o resolución técnica..." maxlength="1000"></textarea>
                <button onclick="agregarNotaTecnica()" id="btn-guardar-nota" class="btn-primary">
                    Guardar Nota
                </button>
            </div>
        </div>

        <!-- Panel de acciones (solo soporte/supervisor) -->
        <div id="panel-acciones" class="detalle-card oculto">
            <h3 style="font-size:17px; font-weight:700; margin-bottom:16px; padding-bottom:14px; border-bottom:1px solid var(--gris-borde);">
                ⚙️ Acciones
            </h3>

            <div id="seccion-asignar" class="accion-seccion oculto">
                <h4>Asignar técnico</h4>
                <div class="accion-fila">
                    <select id="select-tecnico">
                        <option value="">— Seleccioná un técnico —</option>
                    </select>
                    <button onclick="asignarTecnico()" class="btn-primary btn-accion">
                        Asignar
                    </button>
                </div>
            </div>

            <div id="seccion-estado" class="accion-seccion">
                <h4>Cambiar estado</h4>
                <div class="accion-fila">
                    <select id="select-estado">
                        <option value="">— Seleccioná un estado —</option>
                        <option value="ABIERTO">Abierto</option>
                        <option value="EN_PROCESO">En Proceso</option>
                        <option value="RESUELTO">Resuelto</option>
                        <option value="CERRADO">Cerrado</option>
                    </select>
                    <button onclick="cambiarEstado()" class="btn-primary btn-accion">
                        Actualizar Estado
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script>
        let ticketActual = null;
        const usuario = Ui.verificarSesion();

        if (usuario) {
            Ui.mostrarNombreUsuario(usuario);
            document.getElementById("rol-usuario").textContent = usuario.role;

            if (usuario.role !== "TECHNICIAN" && usuario.role !== "SUPERVISOR" && usuario.role !== "SUPPORTER") {
                document.getElementById("formulario-nota").classList.add("oculto");
            }

            cargarTicket();
        }

        function irAlChat() {
            const id = new URLSearchParams(location.search).get('id');
            if (id) window.location.href = 'chat.html?id=' + id;
        }

        function cargarTicket() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get("id");
            if (!id) {
                Ui.mostrarError("mensaje-error", "No se especificó una solicitud.");
                return;
            }

            Api.obtenerTodosTickets()
                .then(tickets => {
                    const ticket = tickets.find(t => t.id == id);
                    if (!ticket) {
                        Ui.mostrarError("mensaje-error", "Solicitud no encontrada.");
                        return;
                    }
                    ticketActual = ticket;
                    renderizarDetalle(ticket);
                    configurarAcciones(ticket);
                    cargarNotas(ticket.id);
                })
                .catch(() => {
                    Ui.mostrarError("mensaje-error", "Error al cargar la solicitud.");
                });
        }

        function renderizarDetalle(t) {
            document.getElementById("ticket-id").textContent = "#" + t.id;
            document.getElementById("ticket-titulo").textContent = t.title || t.category?.name || "Solicitud";
            document.getElementById("ticket-cliente").textContent = t.client ? t.client.name : "N/A";
            document.getElementById("ticket-categoria").textContent = t.category ? t.category.name : "N/A";
            document.getElementById("ticket-fecha").textContent = t.createdAt
                ? new Date(t.createdAt).toLocaleString('es-CR') : "N/A";
            document.getElementById("ticket-descripcion").textContent = t.description;
            document.getElementById("ticket-tecnico").textContent = t.technician
                ? t.technician.name : "Sin asignar aún";

            const estadoEl = document.getElementById("ticket-estado");
            estadoEl.textContent = traducirEstado(t.status);
            estadoEl.className = "badge-estado " + t.status.toLowerCase();

            const prioridadEl = document.getElementById("ticket-prioridad");
            if (t.priority) {
                prioridadEl.textContent = t.priority;
                prioridadEl.className = "badge-prioridad " + t.priority.toLowerCase();
            } else {
                prioridadEl.textContent = "No definida";
                prioridadEl.className = "";
                prioridadEl.style.color = "var(--texto-suave)";
            }

            const selectEstado = document.getElementById("select-estado");
            if (selectEstado) selectEstado.value = t.status;

            if (t.status === "CERRADO" || t.status === "CLOSED") {
                const btnNota = document.getElementById("btn-guardar-nota");
                const txtNota = document.getElementById("texto-nota");
                if (btnNota) btnNota.disabled = true;
                if (txtNota) {
                    txtNota.disabled = true;
                    txtNota.placeholder = "Esta solicitud está cerrada. No se pueden agregar más notas.";
                }
            }
        }

        function configurarAcciones(ticket) {
            if (usuario.role === "SUPERVISOR" || usuario.role === "TECHNICIAN" || usuario.role === "SUPPORTER") {
                document.getElementById("panel-acciones").classList.remove("oculto");
                if (usuario.role === "SUPERVISOR" || usuario.role === "TECHNICIAN") {
                    document.getElementById("seccion-asignar").classList.remove("oculto");
                    cargarTecnicos();
                }
            }
        }

        function cargarTecnicos() {
            Api.obtenerUsuarios()
                .then(usuarios => {
                    const tecnicos = usuarios.filter(u =>
                        u.role === "SUPPORTER" || u.role === "SUPERVISOR" || u.role === "TECHNICIAN"
                    );
                    const select = document.getElementById("select-tecnico");
                    select.innerHTML = '<option value="">— Seleccioná un técnico —</option>';
                    tecnicos.forEach(t => {
                        const opt = document.createElement("option");
                        opt.value = t.id;
                        opt.textContent = t.name + " (" + t.role + ")";
                        if (ticketActual.technician && ticketActual.technician.id === t.id) opt.selected = true;
                        select.appendChild(opt);
                    });
                })
                .catch(() => console.error("No se pudieron cargar los técnicos."));
        }

        function asignarTecnico() {
            const tecnicoId = document.getElementById("select-tecnico").value;
            if (!tecnicoId) { Ui.mostrarError("mensaje-error", "Seleccioná un técnico."); return; }
            document.getElementById("mensaje-error").classList.add("oculto");

            Api.asignarTecnico(ticketActual.id, tecnicoId)
                .then(data => {
                    const ticketAsignado = data && data.ticket ? data.ticket : data;
                    if (ticketAsignado && ticketAsignado.id) {
                        ticketActual = ticketAsignado;
                        renderizarDetalle(ticketAsignado);
                        mostrarExito("✓ Técnico asignado correctamente.");
                    } else {
                        Ui.mostrarError("mensaje-error", "No se pudo asignar el técnico.");
                    }
                })
                .catch(() => Ui.mostrarError("mensaje-error", "Error al asignar el técnico."));
        }

        function cambiarEstado() {
            const nuevoEstado = document.getElementById("select-estado").value;
            if (!nuevoEstado) { Ui.mostrarError("mensaje-error", "Seleccioná un estado."); return; }
            document.getElementById("mensaje-error").classList.add("oculto");

            Api.actualizarEstado(ticketActual.id, nuevoEstado)
                .then(data => {
                    if (data && data.id) {
                        ticketActual = data;
                    } else {
                        ticketActual.status = nuevoEstado;
                    }
                    renderizarDetalle(ticketActual);
                    mostrarExito("✓ Estado actualizado a: " + traducirEstado(nuevoEstado));
                })
                .catch(() => Ui.mostrarError("mensaje-error", "Error al actualizar el estado."));
        }

        function cargarNotas(ticketId) {
            if (typeof Api.obtenerNotasPorTicket === "function") {
                Api.obtenerNotasPorTicket(ticketId)
                    .then(notas => renderizarNotas(notas))
                    .catch(err => console.error("Error al cargar notas:", err));
            }
        }

        function renderizarNotas(notas) {
            const lista = document.getElementById("lista-notas");
            if (!notas || notas.length === 0) {
                lista.innerHTML = '<p class="texto-vacio">No hay notas técnicas registradas para esta solicitud.</p>';
                return;
            }
            lista.innerHTML = "";
            notas.forEach(nota => {
                const autor = nota.user ? nota.user.name : "Usuario";
                const fecha = nota.createdAt ? new Date(nota.createdAt).toLocaleString('es-CR') : "Fecha N/A";
                const div = document.createElement("div");
                div.className = "comentario-item";
                div.innerHTML = `
                    <div class="comentario-meta">
                        <strong>${autor}</strong>
                        <span>${fecha}</span>
                    </div>
                    <div class="comentario-texto">${nota.text}</div>
                `;
                lista.appendChild(div);
            });
        }

        function agregarNotaTecnica() {
            const texto = document.getElementById("texto-nota").value.trim();
            if (!texto) return;

            const btn = document.getElementById("btn-guardar-nota");
            btn.disabled = true;
            btn.textContent = "Guardando...";

            fetch('http://localhost:8080/api/comments/add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ ticketId: ticketActual.id, userId: usuario.id, text: texto })
            })
            .then(r => { if (!r.ok) throw new Error(); return r.json(); })
            .then(() => {
                document.getElementById("texto-nota").value = "";
                cargarNotas(ticketActual.id);
                mostrarExito("✓ Nota guardada correctamente.");
                btn.disabled = false;
                btn.textContent = "Guardar Nota";
            })
            .catch(() => {
                Ui.mostrarError("mensaje-error", "Error al guardar la nota.");
                btn.disabled = false;
                btn.textContent = "Guardar Nota";
            });
        }

        function mostrarExito(mensaje) {
            const exito = document.getElementById("mensaje-exito");
            exito.textContent = mensaje;
            exito.classList.remove("oculto");
            setTimeout(() => exito.classList.add("oculto"), 3000);
        }

        function traducirEstado(status) {
            const estados = {
                "ABIERTO": "Abierto", "ASIGNADO": "Asignado",
                "EN_PROCESO": "En Proceso", "RESUELTO": "Resuelto", "CERRADO": "Cerrado",
                "OPEN": "Abierto", "IN_PROGRESS": "En Proceso",
                "RESOLVED": "Resuelto", "CLOSED": "Cerrado"
            };
            return estados[status] || status;
        }
    </script>
</body>
</html>
