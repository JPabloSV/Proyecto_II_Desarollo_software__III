<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConneXtion - Registro</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <h1>ConneXtion</h1>
                <p>Crear cuenta</p>
            </div>

            <div id="mensaje-error" class="mensaje-error oculto"></div>
            <div id="mensaje-exito" class="mensaje-exito oculto"></div>

            <form id="form-registro">
                <div class="campo">
                    <label for="nombre">Nombre *</label>
                    <input type="text" id="nombre" placeholder="Juan" required>
                </div>
                <div class="campo">
                    <label for="primerApellido">Primer apellido *</label>
                    <input type="text" id="primerApellido" placeholder="Pérez" required>
                </div>
                <div class="campo">
                    <label for="segundoApellido">Segundo apellido *</label>
                    <input type="text" id="segundoApellido" placeholder="González" required>
                </div>
                <div class="campo">
                    <label for="email">Correo electrónico *</label>
                    <input type="email" id="email" placeholder="correo@ejemplo.com" required>
                </div>
                <div class="campo">
                    <label for="password">Contraseña *</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <div class="campo">
                    <label for="telefono">Teléfono</label>
                    <input type="tel" id="telefono" placeholder="8888-8888">
                </div>
                <div class="campo">
                    <label for="direccion">Dirección</label>
                    <input type="text" id="direccion" placeholder="San José, Costa Rica">
                </div>
                <div class="campo">
                    <label for="segundoContacto">Segundo contacto</label>
                    <input type="text" id="segundoContacto" placeholder="8888-8888">
                </div>
                <div class="campo">
                    <label>Servicios suscritos *</label>
                    <div class="servicios-grid">
                        <label class="servicio-item">
                            <input type="checkbox" value="1"> Telefonía móvil
                        </label>
                        <label class="servicio-item">
                            <input type="checkbox" value="2"> Cable
                        </label>
                        <label class="servicio-item">
                            <input type="checkbox" value="3"> Internet
                        </label>
                        <label class="servicio-item">
                            <input type="checkbox" value="4"> Telefonía fija
                        </label>
                    </div>
                </div>
                <button type="submit" class="btn-primary">Registrarse</button>
            </form>

            <div class="login-footer">
                <p>¿Ya tenés cuenta? <a href="index.html">Iniciá sesión</a></p>
            </div>
        </div>
    </div>
