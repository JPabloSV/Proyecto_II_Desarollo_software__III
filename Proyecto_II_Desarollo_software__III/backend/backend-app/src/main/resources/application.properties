spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=ConneXtionHelpDesk;encrypt=true;trustServerCertificate=true;
spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

# Las credenciales que acabamos de activar por c\u00f3digo
spring.datasource.username=sa
spring.datasource.password=1234

jakarta.persistence.jdbc.user=sa
