<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ConneXtion HelpDesk - Panel de Soporte</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <header class="main-header">
        <h1>ConneXtion HelpDesk</h1>
        <p>Mesa de Servicio Técnico</p>
    </header>

    <section class="form-section" style="background: white; border-radius: 8px; padding: 20px; margin-bottom: 30px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.05);">
                <div class="section-header">
                    <h2>Reportar Nueva Incidencia</h2>
                </div>
                <form id="ticket-form">
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px;">
                        <div>
                            <label style="display: block; margin-bottom: 5px; font-weight: 600;">Título del Problema</label>
                            <input type="text" id="form-title" required style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px;">
                        </div>
                        <div>
                            <label style="display: block; margin-bottom: 5px; font-weight: 600;">Prioridad</label>
                            <select id="form-priority" style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px;">
                                <option value="LOW">Baja</option>
                                <option value="MEDIUM" selected>Media</option>
                                <option value="HIGH">Alta</option>
                            </select>
                        </div>
                    </div>
                    <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px;">
                        <div>
                            <label style="display: block; margin-bottom: 5px; font-weight: 600;">ID Cliente (Reporta)</label>
                            <input type="number" id="form-client-id" value="1" required style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px;">
                        </div>
                        <div>
                            <label style="display: block; margin-bottom: 5px; font-weight: 600;">Categoría de Avería</label>
                            <select id="form-category-id" style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px;">
                                <option value="1">Technical Support (ID 1)</option>
                                <option value="2">Network & Connectivity (ID 2)</option>
                                <option value="3">Software & Access (ID 3)</option>
                            </select>
                        </div>
                    </div>
                    <div style="margin-bottom: 15px;">
                        <label style="display: block; margin-bottom: 5px; font-weight: 600;">Descripción Detallada</label>
                        <textarea id="form-description" rows="3" required style="width: 100%; padding: 10px; border: 1px solid var(--border-color); border-radius: 6px; resize: vertical;"></textarea>
                    </div>
                    <button type="submit" class="btn-primary">Enviar Solicitud</button>
                </form>
            </section>
    
    <main class="container">
        <section class="table-section">
            <div class="section-header">
                <h2>Solicitudes Registradas</h2>
                <button id="btn-refresh" class="btn-primary">Actualizar Lista</button>
            </div>

            <div class="table-responsive">
                <table id="tickets-table">
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Título / Descripción</th>
                            <th>Prioridad</th>
                            <th>Estado</th>
                            <th>Cliente</th>
                            <th>Técnico Asignado</th>
                        </tr>
                    </thead>
                    <tbody id="tickets-body">
                        <tr>
                            <td colspan="6" class="text-center">Cargando solicitudes...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <script src="app.js"></script>
</body>
</html>
