<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>ConneXtion HelpDesk - Client Form</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; background-color: #f4f6f9; }
        .form-container { background: white; padding: 25px; border-radius: 8px; max-width: 500px; margin: auto; box-shadow: 0px 0px 10px rgba(0,0,0,0.1); }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="email"], input[type="password"] { width: 100%; padding: 8px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
        .btn-submit { background-color: #0056b3; color: white; border: none; padding: 10px 15px; border-radius: 4px; cursor: pointer; width: 100%; }
        .btn-cancel { background-color: #6c757d; color: white; display: inline-block; text-align: center; text-decoration: none; padding: 10px 15px; border-radius: 4px; width: 100%; box-sizing: border-box; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="form-container">
        <h2 th:text="${client.id != null} ? 'Modify Client' : 'Register Client'">Register Client</h2>
        
        <form th:action="@{/clients/save}" th:object="${client}" method="post">
    
    <input type="hidden" th:field="*{id}" />

    <div class="form-group">
        <label>Name:</label>
        <input type="text" th:field="*{name}" required />
    </div>

    <div class="form-group">
        <label>First Surname:</label>
        <input type="text" th:field="*{firstName}" required />
    </div>

    <div class="form-group">
        <label>Email Address:</label>
        <input type="email" th:field="*{email}" required />
    </div>

    <div class="form-group">
        <label>Password:</label>
        <input type="password" th:field="*{password}" th:required="${client.id == null}" />
    </div>

    <div class="form-group">
        <label>Phone Number:</label>
        <input type="text" th:field="*{phone}" />
    </div>

    <button type="submit" class="btn-submit">Save Client</button>
    <a th:href="@{/clients}" class="btn btn-cancel">Cancel</a>
</form>
    </div>

</body>
</html>
